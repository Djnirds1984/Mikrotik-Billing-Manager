<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ISP Panel</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'media',
      theme: {
        extend: {
          colors: {
            primary: {
              300: 'var(--color-primary-300, #60a5fa)',
              500: 'var(--color-primary-500, #3b82f6)',
              600: 'var(--color-primary-600, #2563eb)',
              700: 'var(--color-primary-700, #1d4ed8)',
            }
          }
        }
      }
    }
  </script>
  <style>
    :root {
      --color-primary-300: #60a5fa;
      --color-primary-500: #3b82f6;
      --color-primary-600: #2563eb;
      --color-primary-700: #1d4ed8;
      --lp-background: #ffffff;
    }
    html { scroll-behavior: smooth; }
    /* ── Theme tokens ── */
    .bg-primary-500 { background-color: var(--color-primary-500); }
    .bg-primary-600 { background-color: var(--color-primary-600); }
    .bg-primary-700 { background-color: var(--color-primary-700); }
    .text-primary-500 { color: var(--color-primary-500); }
    .border-primary-500 { border-color: var(--color-primary-500); }
    .from-primary-300 { --tw-gradient-from: var(--color-primary-300); }
    .to-primary-600 { --tw-gradient-to: var(--color-primary-600); }
    .hover\:bg-primary-500:hover { background-color: var(--color-primary-500); }
    .hover\:bg-primary-700:hover { background-color: var(--color-primary-700); }
    /* ── Chat bubble animations ── */
    .chat-user { background-color: var(--color-primary-600); color: #fff; }
    .chat-model { background-color: #f1f5f9; color: #1e293b; }
    @media (prefers-color-scheme: dark) {
      .chat-model { background-color: #334155; color: #e2e8f0; }
    }
    /* ── Skeleton loader ── */
    .skeleton { animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  </style>
</head>
<body class="min-h-screen text-slate-900 dark:text-slate-100" id="lp-root" style="background:var(--lp-background)">

  <!-- ─── SKELETON LOADER ─── -->
  <div id="skeleton-loader" class="min-h-screen bg-white dark:bg-slate-900 text-slate-900 dark:text-slate-100">
    <div class="mx-auto max-w-7xl px-6 py-24">
      <div class="h-6 w-40 bg-slate-200 dark:bg-slate-800 rounded-md skeleton"></div>
      <div class="mt-6 h-8 w-3/4 bg-slate-200 dark:bg-slate-800 rounded-md skeleton"></div>
      <div class="mt-3 h-4 w-1/2 bg-slate-200 dark:bg-slate-800 rounded-md skeleton"></div>
    </div>
  </div>

  <!-- ─── MAIN CONTENT (hidden until loaded) ─── -->
  <div id="lp-content" class="hidden min-h-screen text-slate-900 dark:text-slate-100" style="background:var(--lp-background)">

    <!-- HEADER -->
    <header class="sticky top-0 z-30 border-b border-slate-200/60 dark:border-slate-800/60 bg-white/70 dark:bg-slate-900/70 backdrop-blur">
      <div class="mx-auto max-w-7xl px-6 py-4 flex items-center justify-between">
        <div class="flex items-center gap-3">
          <div id="header-logo"></div>
          <span id="header-title" class="font-semibold"></span>
        </div>
        <nav id="header-nav" class="hidden md:flex items-center gap-6 text-sm"></nav>
        <div class="flex items-center gap-3">
          <button id="btn-admin-login" onclick="go('/login')" class="px-4 py-2 rounded-md border border-slate-300 dark:border-slate-700 hover:bg-slate-50 dark:hover:bg-slate-800"></button>
          <button onclick="go('/client_portal')" class="px-4 py-2 rounded-md bg-primary-500 text-white hover:opacity-90" id="btn-client-portal"></button>
        </div>
      </div>
    </header>

    <main>
      <!-- HERO -->
      <section class="mx-auto max-w-7xl px-6 py-16 md:py-24 grid md:grid-cols-2 gap-10 items-center">
        <div>
          <p id="hero-badge" class="text-sm font-medium text-primary-500 tracking-wide uppercase"></p>
          <h1 id="hero-title" class="mt-3 text-4xl md:text-5xl font-bold leading-tight"></h1>
          <p id="hero-subtitle" class="mt-4 text-slate-600 dark:text-slate-300"></p>
          <div class="mt-6 flex items-center gap-3">
            <button onclick="scrollToId('#plans')" id="hero-cta" class="px-6 py-3 rounded-md bg-primary-500 text-white hover:opacity-90"></button>
          </div>
          <p class="mt-3 text-xs text-slate-500">
            <span id="hero-login-prompt"></span>
            <span class="underline cursor-pointer" onclick="go('/login')" id="hero-login-label"></span>
          </p>
        </div>
        <div class="rounded-xl border border-slate-200 dark:border-slate-800 p-3 bg-white dark:bg-slate-900">
          <div id="hero-image-area"></div>
          <div id="product-cards" class="mt-3 grid grid-cols-3 gap-3 text-sm"></div>
        </div>
      </section>

      <!-- FEATURES -->
      <section id="features-section" class="hidden bg-slate-50 dark:bg-slate-950/40 border-y border-slate-200 dark:border-slate-800">
        <div id="features-grid" class="mx-auto max-w-7xl px-6 py-14 grid md:grid-cols-3 gap-6"></div>
      </section>

      <!-- PLANS -->
      <section id="plans-section" class="hidden mx-auto max-w-7xl px-6 py-16">
        <h2 id="plans-title" class="text-2xl font-bold"></h2>
        <div id="plans-grid" class="mt-6 grid sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
      </section>

      <!-- CUSTOM PAGES -->
      <div id="custom-pages"></div>

      <!-- INQUIRY FORM -->
      <section id="inquire" class="mx-auto max-w-7xl px-6 py-16">
        <h2 class="text-2xl font-bold">Inquiry Form</h2>
        <div class="mt-4 grid md:grid-cols-2 gap-6">
          <div class="space-y-3">
            <input id="inq-name" class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" placeholder="Name" />
            <input id="inq-email" class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" placeholder="Email" />
            <input id="inq-phone" class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" placeholder="Phone" />
            <select id="inq-plan" class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900">
              <option value="">Plan</option>
            </select>
          </div>
          <div class="space-y-3">
            <textarea id="inq-message" class="w-full h-[180px] px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" placeholder="Message"></textarea>
            <div class="flex items-center gap-3">
              <button onclick="submitInquiry()" class="px-4 py-2 rounded-md bg-primary-500 text-white hover:opacity-90">Submit</button>
              <span id="inq-status" class="text-sm text-slate-600 dark:text-slate-300"></span>
            </div>
          </div>
        </div>
      </section>

      <!-- CONTACT -->
      <section id="contact" class="mx-auto max-w-7xl px-6 py-16">
        <h2 id="contact-title" class="text-2xl font-bold"></h2>
        <div id="contact-grid" class="mt-4 grid sm:grid-cols-2 lg:grid-cols-3 gap-6 text-sm"></div>
      </section>
    </main>

    <!-- FOOTER -->
    <footer class="border-t border-slate-200 dark:border-slate-800">
      <div class="mx-auto max-w-7xl px-6 py-10 flex flex-col md:flex-row items-center justify-between gap-4">
        <div id="footer-copy" class="text-sm text-slate-600 dark:text-slate-400"></div>
        <div id="footer-links" class="flex items-center gap-4 text-sm"></div>
      </div>
    </footer>
  </div>

  <!-- ─── CHAT BUTTON ─── -->
  <button id="chat-fab" onclick="openChat()" class="hidden fixed bottom-4 right-4 sm:bottom-6 sm:right-6 bg-primary-600 hover:bg-primary-500 text-white rounded-full p-3 sm:p-4 shadow-lg z-40 transition-transform hover:scale-110">
    Chat
  </button>

  <!-- ─── CHAT MODAL ─── -->
  <div id="chat-modal" class="hidden fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-4">
    <div class="bg-white dark:bg-slate-800 rounded-lg shadow-xl w-full max-w-lg h-[70vh] border border-slate-200 dark:border-slate-700 flex flex-col">
      <!-- Chat header -->
      <div class="p-4 border-b border-slate-200 dark:border-slate-700 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <button id="tab-inquiry" onclick="setChatChannel('inquiry')" class="px-3 py-1 rounded-md text-sm bg-primary-600 text-white">Inquiry</button>
          <button id="tab-complaint" onclick="setChatChannel('complaint')" class="px-3 py-1 rounded-md text-sm bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-slate-200">Complaints</button>
        </div>
        <button onclick="closeChat()" class="p-1 text-slate-400 hover:text-slate-800 dark:hover:text-white text-2xl leading-none">&times;</button>
      </div>
      <!-- Prefill step -->
      <div id="chat-prefill" class="p-4 space-y-3">
        <div class="text-sm text-slate-600 dark:text-slate-300">Please enter your details before starting the chat.</div>
        <input id="chat-name" class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" placeholder="Name" />
        <input id="chat-address" class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" placeholder="Address" />
        <input id="chat-account" class="w-full px-3 py-2 rounded-md border border-slate-300 dark:border-slate-700 bg-white dark:bg-slate-900" placeholder="Account Name or Number" />
        <div id="chat-error" class="hidden text-sm text-red-600 dark:text-red-300"></div>
        <div class="flex items-center justify-end">
          <button onclick="startChat()" class="px-4 py-2 rounded-md bg-primary-600 text-white hover:bg-primary-700">Start Chat</button>
        </div>
      </div>
      <!-- Chat step -->
      <div id="chat-messages-area" class="hidden flex-1 flex flex-col min-h-0">
        <div id="chat-messages" class="flex-1 p-4 overflow-y-auto flex flex-col space-y-3 pr-2" style="scroll-behavior:smooth"></div>
        <div class="p-4 border-t border-slate-200 dark:border-slate-700 flex gap-2">
          <input id="chat-input" type="text" placeholder="Type your message..." class="flex-1 p-2 bg-slate-100 dark:bg-slate-700 rounded-md border border-slate-200 dark:border-slate-600" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat()}" />
          <button onclick="sendChat()" id="chat-send-btn" class="px-4 py-2 bg-primary-600 hover:bg-primary-700 text-white rounded-md disabled:opacity-50">Send</button>
        </div>
      </div>
    </div>
  </div>

<script>
/* ═══════════════════════════════════════════
   STATE
   ═══════════════════════════════════════════ */
let cfg = {};
let company = { companyName: '', logoBase64: '' };
let chatChannel = 'inquiry';
let chatHistory = [];
let chatLoading = false;
let chatPollTimer = null;

/* ═══════════════════════════════════════════
   HELPERS
   ═══════════════════════════════════════════ */
const $ = id => document.getElementById(id);
const go = path => { window.location.href = path; };
const scrollToId = sel => { const el = document.querySelector(sel); if (el) el.scrollIntoView({ behavior: 'smooth' }); };
const esc = s => { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; };

function applyTheme(theme) {
  const r = document.documentElement.style;
  if (theme.primary500) r.setProperty('--color-primary-500', theme.primary500);
  if (theme.primary600) r.setProperty('--color-primary-600', theme.primary600);
  if (theme.primary700) r.setProperty('--color-primary-700', theme.primary700);
  if (theme.primary300) r.setProperty('--color-primary-300', theme.primary300);
  if (theme.background)  r.setProperty('--lp-background', theme.background);
}

function displayName() {
  return cfg.webTitle || company.companyName || 'ISP Panel';
}

/* ═══════════════════════════════════════════
   LOAD CONFIG
   ═══════════════════════════════════════════ */
async function loadConfig() {
  try {
    const res = await fetch(`/api/public/landing-page?v=${Date.now()}`, {
      headers: { 'Content-Type': 'application/json', 'Cache-Control': 'no-cache' },
      cache: 'no-store'
    });
    if (res.ok) {
      const data = await res.json();
      company = data.company || {};
      cfg = data.config || {};
      localStorage.setItem('lp_config', JSON.stringify(cfg));
    } else {
      try { cfg = JSON.parse(localStorage.getItem('lp_config') || '{}'); } catch { cfg = {}; }
    }
  } catch {
    try { cfg = JSON.parse(localStorage.getItem('lp_config') || '{}'); } catch { cfg = {}; }
  }
  applyTheme(cfg.theme || {});
  render();
  $('skeleton-loader').classList.add('hidden');
  $('lp-content').classList.remove('hidden');
  $('chat-fab').classList.remove('hidden');
}

/* ═══════════════════════════════════════════
   RENDER
   ═══════════════════════════════════════════ */
function render() {
  document.title = displayName();

  // ── Header ──
  const logoEl = $('header-logo');
  if (company.logoBase64) {
    logoEl.innerHTML = `<img src="${esc(company.logoBase64)}" alt="Logo" class="h-9 w-9 rounded-lg object-contain" />`;
  } else {
    logoEl.innerHTML = `<div class="h-9 w-9 rounded-lg bg-primary-500 text-white grid place-content-center font-bold">ISP</div>`;
  }
  $('header-title').textContent = displayName();
  $('btn-admin-login').textContent = cfg.navAdminLabel || 'Admin Login';
  $('btn-client-portal').textContent = cfg.navClientPortalLabel || 'Client Portal';

  // Nav links
  const pages = cfg.pages || [];
  $('header-nav').innerHTML = pages.map(p =>
    `<button onclick="go('#${esc(p.id)}')" class="hover:text-primary-500">${esc(p.label)}</button>`
  ).join('');

  // ── Hero ──
  $('hero-badge').textContent = cfg.heroBadge || 'All‑in‑One ISP Suite';
  $('hero-title').textContent = cfg.heroTitle || 'Mikrotik Billing & Network Management';
  $('hero-subtitle').textContent = cfg.heroSubtitle || 'Automate PPPoE, DHCP captive portal, billing, receipts, and client notifications. Built for small to mid‑size ISPs using MikroTik.';
  $('hero-cta').textContent = cfg.heroCtaLabel || 'View Plans';
  $('hero-login-prompt').textContent = (cfg.heroLoginPrompt || 'Have an account?') + ' ';
  $('hero-login-label').textContent = cfg.heroLoginLabel || 'Login';

  // Hero image
  const imgArea = $('hero-image-area');
  if (cfg.adImageBase64) {
    imgArea.innerHTML = `<img src="${esc(cfg.adImageBase64)}" alt="${esc(cfg.adImageAlt || displayName())}" class="aspect-[16/10] w-full object-cover rounded-lg" />`;
  } else {
    imgArea.innerHTML = `<div class="aspect-[16/10] rounded-lg bg-gradient-to-br from-primary-300 to-primary-600 opacity-90 grid place-content-center text-white text-lg font-semibold">${esc(displayName())}</div>`;
  }

  // Product cards
  const cards = cfg.productCards || [];
  $('product-cards').innerHTML = cards.length > 0 ? cards.map(c => `
    <div class="rounded-md border border-slate-200 dark:border-slate-800 p-3">
      <div class="font-semibold">${esc(c.title)}</div>
      ${c.subtitle ? `<div class="text-slate-500 text-xs">${esc(c.subtitle)}</div>` : ''}
      ${c.priceText ? `<div class="mt-2 text-primary-500 font-bold">${esc(c.priceText)}</div>` : ''}
    </div>
  `).join('') : '';

  // ── Features ──
  const features = cfg.features || [];
  if (features.length > 0) {
    $('features-section').classList.remove('hidden');
    $('features-grid').innerHTML = features.map(f => `
      <div class="p-6 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
        <div class="text-primary-500 font-semibold">${esc(f.title)}</div>
        <p class="mt-2 text-sm text-slate-600 dark:text-slate-300">${esc(f.description)}</p>
      </div>
    `).join('');
  }

  // ── Plans ──
  const plans = cfg.plans || [];
  if (plans.length > 0) {
    $('plans-section').classList.remove('hidden');
    $('plans-title').textContent = cfg.plansTitle || 'Plans';
    $('plans-grid').innerHTML = plans.map(p => `
      <div class="p-6 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
        <div class="font-semibold">${esc(p.name)}</div>
        ${p.speedText ? `<div class="mt-1 text-sm text-slate-600 dark:text-slate-300">${esc(p.speedText)}</div>` : ''}
        <div class="mt-2 text-primary-500 font-bold">${esc(p.priceText)}</div>
        <button onclick="selectPlanAndScroll('${esc(p.name)}')" class="mt-4 w-full px-4 py-2 rounded-md bg-primary-500 text-white hover:opacity-90">${esc(p.ctaLabel || 'Inquire')}</button>
      </div>
    `).join('');

    // Populate inquiry plan dropdown
    const sel = $('inq-plan');
    sel.innerHTML = '<option value="">Plan</option>' + plans.map(p => `<option value="${esc(p.name)}">${esc(p.name)}</option>`).join('');
  }

  // ── Custom pages ──
  const skipIds = ['features', 'plans', 'contact'];
  $('custom-pages').innerHTML = pages.filter(p => !skipIds.includes(p.id)).map(p => `
    <section id="${esc(p.id)}" class="mx-auto max-w-7xl px-6 py-16">
      <h2 class="text-2xl font-bold">${esc(p.label)}</h2>
      <p class="text-slate-600 dark:text-slate-300 text-sm mt-1">Customize this section content.</p>
    </section>
  `).join('');

  // ── Contact ──
  $('contact-title').textContent = cfg.contactTitle || 'Contact';
  const contactEmail = cfg.contactEmail || company.email;
  let contactHtml = '';
  if (contactEmail) {
    contactHtml += `<div class="p-6 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="font-semibold">Email</div>
      <a class="mt-1 block text-primary-500" href="mailto:${esc(contactEmail)}">${esc(contactEmail)}</a>
    </div>`;
  }
  if (cfg.contactPhone) {
    contactHtml += `<div class="p-6 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="font-semibold">Phone</div>
      <a class="mt-1 block text-primary-500" href="tel:${esc(cfg.contactPhone)}">${esc(cfg.contactPhone)}</a>
    </div>`;
  }
  if (cfg.contactAddress) {
    contactHtml += `<div class="p-6 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="font-semibold">Address</div>
      <div class="mt-1 text-slate-600 dark:text-slate-300">${esc(cfg.contactAddress)}</div>
    </div>`;
  }
  if (cfg.contactFacebookUrl) {
    contactHtml += `<div class="p-6 rounded-lg border border-slate-200 dark:border-slate-800 bg-white dark:bg-slate-900">
      <div class="font-semibold">Facebook</div>
      <a class="mt-1 block text-primary-500" href="${esc(cfg.contactFacebookUrl)}" target="_blank" rel="noreferrer">${esc(cfg.contactFacebookUrl)}</a>
    </div>`;
  }
  $('contact-grid').innerHTML = contactHtml;

  // ── Footer ──
  $('footer-copy').textContent = `© ${new Date().getFullYear()} ${displayName()}`;
  const footerLinks = cfg.footerLinks || [];
  $('footer-links').innerHTML = footerLinks.map(l =>
    `<a href="${esc(l.href)}" class="hover:text-primary-500">${esc(l.label)}</a>`
  ).join('');
}

/* ═══════════════════════════════════════════
   INQUIRY
   ═══════════════════════════════════════════ */
async function submitInquiry() {
  const status = $('inq-status');
  status.textContent = 'Submitting...';
  try {
    const res = await fetch('/api/public/inquiry', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        name: $('inq-name').value,
        email: $('inq-email').value,
        phone: $('inq-phone').value,
        message: $('inq-message').value,
        planName: $('inq-plan').value
      })
    });
    if (!res.ok) {
      const err = await res.json().catch(() => ({ message: 'Failed' }));
      status.textContent = err.message || 'Failed to submit.';
      return;
    }
    status.textContent = 'Inquiry submitted. Thank you!';
    $('inq-name').value = '';
    $('inq-email').value = '';
    $('inq-phone').value = '';
    $('inq-message').value = '';
  } catch {
    status.textContent = 'An error occurred while submitting.';
  }
}

/* ═══════════════════════════════════════════
   PLAN SELECTION
   ═══════════════════════════════════════════ */
function selectPlanAndScroll(name) {
  $('inq-plan').value = name;
  scrollToId('#inquire');
}

/* ═══════════════════════════════════════════
   CHAT
   ═══════════════════════════════════════════ */
function openChat() {
  $('chat-modal').classList.remove('hidden');
  $('chat-prefill').classList.remove('hidden');
  $('chat-messages-area').classList.add('hidden');
  $('chat-error').classList.add('hidden');
  chatHistory = [];
  renderChatMessages();
}

function closeChat() {
  $('chat-modal').classList.add('hidden');
  if (chatPollTimer) { clearInterval(chatPollTimer); chatPollTimer = null; }
}

function setChatChannel(ch) {
  chatChannel = ch;
  $('tab-inquiry').className = ch === 'inquiry'
    ? 'px-3 py-1 rounded-md text-sm bg-primary-600 text-white'
    : 'px-3 py-1 rounded-md text-sm bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-slate-200';
  $('tab-complaint').className = ch === 'complaint'
    ? 'px-3 py-1 rounded-md text-sm bg-primary-600 text-white'
    : 'px-3 py-1 rounded-md text-sm bg-slate-100 dark:bg-slate-700 text-slate-800 dark:text-slate-200';
}

async function startChat() {
  const name = $('chat-name').value.trim();
  const address = $('chat-address').value.trim();
  const account = $('chat-account').value.trim();
  const errEl = $('chat-error');

  if (!name || !address || !account) {
    errEl.textContent = 'Please fill Name, Address, and Account before chatting.';
    errEl.classList.remove('hidden');
    return;
  }
  errEl.classList.add('hidden');

  try {
    const resp = await fetch('/api/public/chat-start', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, address, account, channel: chatChannel })
    });
    if (!resp.ok) {
      const err = await resp.json().catch(() => ({ message: 'Unable to initialize chat.' }));
      errEl.textContent = err.message || 'Unable to initialize chat.';
      errEl.classList.remove('hidden');
      return;
    }
    $('chat-prefill').classList.add('hidden');
    $('chat-messages-area').classList.remove('hidden');
    chatHistory = [{ role: 'model', content: chatChannel === 'complaint' ? 'Submit your complaint here. The admin will respond.' : 'Send your inquiry here. The admin will respond.' }];
    renderChatMessages();
    startPolling();
  } catch {
    errEl.textContent = 'An error occurred while starting chat.';
    errEl.classList.remove('hidden');
  }
}

function renderChatMessages() {
  const container = $('chat-messages');
  container.innerHTML = chatHistory.map(msg => `
    <div class="w-full flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'} items-start">
      <div class="inline-block max-w-[80%] px-3 py-2 rounded-2xl shadow-sm ${msg.role === 'user' ? 'chat-user' : 'chat-model'}">
        <p class="text-sm leading-relaxed break-words whitespace-pre-wrap">${esc(msg.content)}</p>
      </div>
    </div>
  `).join('') + (chatLoading ? '<div class="w-full flex justify-start"><div class="px-3 py-2 rounded-2xl chat-model">...</div></div>' : '');
  container.scrollTop = container.scrollHeight;
}

async function sendChat() {
  const input = $('chat-input');
  const msg = input.value.trim();
  if (!msg || chatLoading) return;
  input.value = '';
  chatHistory.push({ role: 'user', content: msg });
  chatLoading = true;
  renderChatMessages();
  try {
    const resp = await fetch('/api/captive-message', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        message: msg,
        name: $('chat-name').value,
        address: $('chat-address').value,
        account: $('chat-account').value,
        channel: chatChannel
      })
    });
    const data = await resp.json();
    if (!resp.ok) throw new Error(data.message || 'Failed to send message.');
    chatHistory.push({ role: 'model', content: 'Your message has been sent to the admin.' });
  } catch (e) {
    chatHistory.push({ role: 'model', content: `Error sending message: ${e.message}` });
  } finally {
    chatLoading = false;
    renderChatMessages();
  }
}

function startPolling() {
  if (chatPollTimer) clearInterval(chatPollTimer);
  const loadThread = async () => {
    try {
      const resp = await fetch('/api/captive-thread');
      if (!resp.ok) return;
      const data = await resp.json();
      const msgs = data
        .filter(n => !String(n.message || '').toLowerCase().startsWith('chat started'))
        .map(n => ({ role: n.type === 'admin-reply' ? 'model' : 'user', content: String(n.message || '') }));
      if (msgs.length > 0) { chatHistory = msgs; renderChatMessages(); }
    } catch {}
  };
  loadThread();
  chatPollTimer = setInterval(loadThread, 5000);
}

/* ═══════════════════════════════════════════
   INIT
   ═══════════════════════════════════════════ */
document.addEventListener('DOMContentLoaded', loadConfig);
</script>
